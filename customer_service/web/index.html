<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智服助手 · 智能客服</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="top-nav">
          <a class="nav-link" href="/kb/" title="知识库管理">知识库</a>
        </div>
        <div class="brand" aria-hidden="true">
          <svg class="brand-mark" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="url(#brandGrad)" />
            <path
              d="M14 28c4-10 16-14 20-4 1 3-1 6-4 7-5 2-10 0-13-3"
              stroke="#fff"
              stroke-width="2.4"
              stroke-linecap="round"
              fill="none"
            />
            <circle cx="30" cy="18" r="2.2" fill="#fff" />
            <defs>
              <linearGradient id="brandGrad" x1="8" y1="4" x2="40" y2="44">
                <stop stop-color="#2F6BFF" />
                <stop offset="1" stop-color="#1A4FD6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="hero-title">使用快速咨询开始对话</h1>
        <p class="hero-sub">企业智能客服 · 流式对话 · 同服知识库 /kb</p>
      </header>

      <div
        class="mode-bar"
        role="tablist"
        aria-label="对话模式"
        data-mode="fast"
      >
        <button
          type="button"
          class="mode-btn is-active"
          role="tab"
          aria-selected="true"
          data-mode="fast"
        >
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                fill="currentColor"
                d="M13 2 4 14h7l-1 8 10-14h-7l0-6z"
              />
            </svg>
          </span>
          快速咨询
        </button>
        <button
          type="button"
          class="mode-btn"
          role="tab"
          aria-selected="false"
          data-mode="expert"
        >
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                fill="currentColor"
                d="M12 2 4.5 6.5v5.5c0 5 3.4 9.4 7.5 10.5 4.1-1.1 7.5-5.5 7.5-10.5V6.5L12 2zm0 2.2 5.5 3.2v4.6c0 3.7-2.4 7-5.5 8.1-3.1-1.1-5.5-4.4-5.5-8.1V7.4L12 4.2z"
              />
            </svg>
          </span>
          专家协助
        </button>
        <button
          type="button"
          class="mode-btn"
          role="tab"
          aria-selected="false"
          data-mode="vision"
        >
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                fill="currentColor"
                d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm1 2v10h14V7H5zm3 8 3-4 2 2.5L16 9l3 6H8z"
              />
            </svg>
          </span>
          识图反馈
        </button>
      </div>

      <section class="transcript" id="transcript" aria-live="polite"></section>

      <aside class="resume-panel is-hidden" id="resume-panel">
        <p class="resume-title">会话等待人工处理</p>
        <label class="sr-only" for="resume-message">人工回复</label>
        <input
          id="resume-message"
          type="text"
          placeholder="输入人工处理说明后恢复会话"
        />
        <button type="button" class="resume-btn" id="resume-btn">提交并恢复</button>
      </aside>

      <form class="composer" id="composer" autocomplete="off">
        <label class="sr-only" for="message">消息内容</label>
        <textarea
          id="message"
          name="message"
          rows="3"
          placeholder="描述您的问题，例如：退款政策是什么？（Enter 发送，Shift+Enter 换行）"
        ></textarea>

        <div class="composer-footer">
          <div class="toggles">
            <button
              type="button"
              class="chip"
              data-toggle="deep-think"
              aria-pressed="false"
            >
              <span class="chip-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="14" height="14">
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path
                    d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1 7 17M17 7l2.1-2.1"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              深度分析
            </button>
            <button
              type="button"
              class="chip"
              data-toggle="smart-search"
              aria-pressed="false"
            >
              <span class="chip-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="14" height="14">
                  <circle
                    cx="11"
                    cy="11"
                    r="6.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path
                    d="M16 16l4.5 4.5"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              知识检索
            </button>
          </div>

          <div class="actions">
            <button
              type="button"
              class="icon-btn"
              id="attach-btn"
              title="上传附件（占位）"
              aria-label="上传附件"
            >
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path
                  fill="currentColor"
                  d="M8.5 21a5.5 5.5 0 0 1-3.9-9.4l8.5-8.5a3.5 3.5 0 0 1 5 5l-8.2 8.2a1.5 1.5 0 1 1-2.1-2.1l7.4-7.4 1.1 1.1-7.4 7.4a3.5 3.5 0 1 0 4.9 4.9l8.2-8.2a5.5 5.5 0 1 0-7.8-7.8L5.7 12.7A7.5 7.5 0 0 0 16.3 23l.7-1.3A6 6 0 0 1 8.5 21z"
                />
              </svg>
            </button>
            <button
              type="submit"
              class="send-btn"
              id="send-btn"
              title="发送"
              aria-label="发送"
            >
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M12 4.5 5 12h4v8h6v-8h4L12 4.5z"
                />
              </svg>
            </button>
          </div>
        </div>
      </form>

      <p class="hint" id="status-hint" role="status" aria-live="polite">
        提示：请先启动 API（uvicorn），再在本页发送消息。
      </p>
    </div>

    <script>
      // 同域由 FastAPI 托管时用 ""；单独静态服务时默认指向 8000
      window.CS_API_BASE =
        window.CS_API_BASE ||
        (location.port === "8000" ? "" : "http://127.0.0.1:8000");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="./js/app.js" defer></script>
  </body>
</html>
